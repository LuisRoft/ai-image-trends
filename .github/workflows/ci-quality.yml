name: CI Quality

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

permissions:
  contents: read

jobs:
  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run React Doctor
        id: doctor
        uses: millionco/react-doctor@97b21f18ee4c5b530d683ae6626548081a4aad76
        with:
          diff: ${{ github.event_name == 'pull_request' && github.base_ref || 'main' }}
          verbose: true

      - name: Enforce minimum score
        run: |
          SCORE="${{ steps.doctor.outputs.score }}"
          if [ -z "$SCORE" ] || [ "$SCORE" -lt 75 ]; then
            echo "::error::React Doctor score $SCORE is below minimum 75"
            exit 1
          fi

  verify-build:
    name: Build
    runs-on: ubuntu-latest
    needs: react-doctor
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check required secrets
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$NEXT_PUBLIC_CONVEX_URL" ]; then
            echo "::error::NEXT_PUBLIC_CONVEX_URL secret is missing or empty. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ]; then
            echo "::error::NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY secret is missing or empty. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Build
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: pnpm run build

  lint-report:
    name: Lint (report only)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint
